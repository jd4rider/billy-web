<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <linearGradient id="hornGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ── Horns (drawn first, behind head) ── -->
  <!-- Left horn: sweeps outward and up -->
  <path d="M 195 200 C 175 170, 140 130, 148 80 C 152 55, 172 48, 186 62 C 168 80, 172 118, 196 162 Z"
        fill="url(#hornGrad)"/>
  <!-- Right horn -->
  <path d="M 317 200 C 337 170, 372 130, 364 80 C 360 55, 340 48, 326 62 C 344 80, 340 118, 316 162 Z"
        fill="url(#hornGrad)"/>

  <!-- ── Ears (behind head) ── -->
  <ellipse cx="155" cy="264" rx="32" ry="20" fill="#e2e8f0" transform="rotate(-25 155 264)"/>
  <ellipse cx="357" cy="264" rx="32" ry="20" fill="#e2e8f0" transform="rotate(25 357 264)"/>
  <ellipse cx="155" cy="264" rx="19" ry="12" fill="#fda4af" transform="rotate(-25 155 264)"/>
  <ellipse cx="357" cy="264" rx="19" ry="12" fill="#fda4af" transform="rotate(25 357 264)"/>

  <!-- ── Head ── -->
  <rect x="175" y="182" width="162" height="204" rx="50" fill="url(#faceGrad)"/>

  <!-- ── Eyes ── -->
  <!-- Sclera -->
  <ellipse cx="224" cy="272" rx="28" ry="20" fill="#fffbeb"/>
  <ellipse cx="288" cy="272" rx="28" ry="20" fill="#fffbeb"/>
  <!-- Iris: amber gold — characteristic goat color -->
  <ellipse cx="224" cy="272" rx="20" ry="15" fill="#d97706"/>
  <ellipse cx="288" cy="272" rx="20" ry="15" fill="#d97706"/>
  <!-- Horizontal slit pupil (the defining goat feature) -->
  <rect x="210" y="268" width="28" height="8" rx="4" fill="#1a0500"/>
  <rect x="274" y="268" width="28" height="8" rx="4" fill="#1a0500"/>
  <!-- Eye shine -->
  <circle cx="231" cy="265" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="295" cy="265" r="5" fill="rgba(255,255,255,0.6)"/>

  <!-- ── Snout / muzzle ── -->
  <ellipse cx="256" cy="336" rx="46" ry="32" fill="#dde4f0"/>
  <!-- Nostrils -->
  <ellipse cx="242" cy="342" rx="8" ry="6" fill="#94a3b8"/>
  <ellipse cx="270" cy="342" rx="8" ry="6" fill="#94a3b8"/>

  <!-- ── Goatee ── -->
  <path d="M 238 384 C 238 388, 244 414, 250 428 C 253 438, 256 444, 256 444
           C 256 444, 259 438, 262 428 C 268 414, 274 388, 274 384
           Q 264 390, 256 390 Q 248 390, 238 384 Z"
        fill="#dde4f0"/>

  <!-- ── Amber accent dot / terminal mark ── -->
  <circle cx="256" cy="474" r="14" fill="#f59e0b"/>
  <rect x="249" y="469" width="4" height="10" rx="2" fill="#0d1117"/>
  <rect x="256" y="475" width="10" height="4" rx="2" fill="#0d1117"/>
</svg>

